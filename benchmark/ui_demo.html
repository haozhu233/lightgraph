<!DOCTYPE html>
<html>
<head><title>lightgraph UI demo</title></head>
<body style="margin:0">
<div id="graph" style="width: 100vw; height: 100vh;"></div>
<script src="d3.v7.min.js"></script>
<script src="../lightgraph.js"></script>
<script>
    const groups = ['Immune', 'Metabolic', 'Signaling', 'Transport'];
    const nodes = [];
    const edges = [];
    let id = 0;
    groups.forEach((g, gi) => {
        const members = [];
        for (let i = 0; i < 14; i++) {
            const name = g.slice(0, 3).toUpperCase() + '-' + (i + 1);
            nodes.push({ id: name, group: g });
            members.push(name);
        }
        for (let i = 0; i < 22; i++) {
            const a = members[(i * 7 + gi) % members.length];
            const b = members[(i * 3 + 5) % members.length];
            if (a !== b) edges.push({ source: a, target: b, weight: 1 + (i % 5) });
        }
    });
    // sparse cross-group links
    for (let i = 0; i < 10; i++) {
        edges.push({
            source: nodes[(i * 13) % nodes.length].id,
            target: nodes[(i * 29 + 17) % nodes.length].id,
            weight: 1
        });
    }

    const graph = new window.lightGraph.LightGraph(document.getElementById('graph'), {
        nodes, edges,
        config: {
            ui: {
                showStatistics: true,
                theme: location.search.includes('dark') ? 'dark' : 'light'
            },
            labels: { fontSize: 8 }
        }
    });

    // Variant control via query string: ?sidebar opens the tools sidebar
    if (location.search.includes('sidebar')) {
        setTimeout(() => {
            // Disable the slide transition so headless screenshots (which
            // run under virtual time) capture the settled position.
            document.getElementById('sceneSidebar').style.transition = 'none';
            document.getElementById('sidebarToggle').click();
        }, 500);
    }
</script>
</body>
</html>
