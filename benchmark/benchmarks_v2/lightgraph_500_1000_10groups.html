    function percentile(sorted, p) {

    function runBenchmark() {
        const results = {
            libName: 'lightgraph', numGroups: 10,
            numNodes: graphData.nodes.length,

            const t0 = performance.now();

                    results.initTimeMs = performance.now() - t0;
                    setTimeout(() => measureFrames(results), 500);
                }
            }, 20);
        };

            deltas.push(now - last);
            last = now;
            if (now - start < MEASURE_MS) {
                requestAnimationFrame(frame);
            } else {
                const elapsed = now - start;
                results.avgFps = (deltas.length / elapsed) * 1000;
                const sorted = [...deltas].sort((a, b) => a - b);
                results.frameP50Ms = percentile(sorted, 0.50);
                results.frameP95Ms = percentile(sorted, 0.95);
                results.frameMaxMs = sorted[sorted.length - 1];
                if (performance.memory) {
                    results.memoryMB = performance.memory.usedJSHeapSize / (1024 * 1024);
                }
                sendResults(results);
            }
        }
        requestAnimationFrame(frame);
    }

    function sendResults(results) {
        fetch('http://localhost:8000/log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(results),
        })
        .then(r => r.text())
        .then(d => { document.title = 'BENCHMARK_DONE'; console.log('Success:', d); })
        .catch(e => { document.title = 'BENCHMARK_FAILED'; console.error('Error:', e); });
    }

    window.onload = runBenchmark;
</script>

</body>
</html>
